<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Management Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Fresh Grocer - Admin Panel</h1>
            <a href="index.html" class="nav-link">← Back to Store</a>
        </div>
    </header>

    <div class="container layout-admin">
        <section class="admin-form-section">
            <h2>Add / Manage Product</h2>
            <form id="product-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="prod-id">
                
                <label>Vegetable Name</label>
                <input type="text" id="prod-name" required placeholder="e.g., Sweet Potato">

                <label>Price (₹)</label>
                <input type="number" id="prod-price" required placeholder="e.g., 50">

                <label>Selling Unit</label>
                <select id="prod-unit">
                    <option value="fake">Select Unit</option>
                    <option value="kg">Per kg</option>
                    <option value="bunch">Per Bunch</option>
                    <option value="piece">Per Piece</option>
                    <option value="pack">Per Pack</option>
                </select>

                <label>Category Group</label>
                <select id="prod-category">
                    <option value="Greens">Greens</option>
                    <option value="Root">Root Vegetables</option>
                    <option value="Gourd">Gourds</option>
                    <option value="Nightshade">Nightshades</option>
                    <option value="Herbs">Herbs & Spices</option>
                </select>

                <label>Image URL</label>
                <input type="url" id="prod-image" value="https://images.unsplash.com/photo-1592394533824-9440e5d68530?w=150">

                <button type="submit" class="whatsapp-btn">Save Product</button>
                <button type="button" class="close-btn" onclick="clearForm()" style="margin-top: 10px;">Clear Form</button>
            </form>
        </section>

        <section class="admin-table-section">
            <h2>Live Inventory Items</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Item Name</th>
                            <th>Category</th>
                            <th>Price Breakup</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let vegetables = JSON.parse(localStorage.getItem('vegetables')) || [];

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';

            vegetables.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><img src="${item.image}" width="40" height="40" style="object-fit:cover; border-radius:4px;"></td>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.category}</td>
                    <td>₹${item.price} / ${item.unit}</td>
                    <td>
                        <button class="edit-btn" onclick="editProduct(${item.id})">Edit</button>
                        <button class="delete-btn" onclick="deleteProduct(${item.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('prod-id').value;
            const name = document.getElementById('prod-name').value;
            const price = Number(document.getElementById('prod-price').value);
            const unit = document.getElementById('prod-unit').value;
            const category = document.getElementById('prod-category').value;
            const image = document.getElementById('prod-image').value;

            if (id) {
                // Update existing item
                const index = vegetables.findIndex(v => v.id == id);
                vegetables[index] = { id: Number(id), name, price, unit, category, image };
            } else {
                // Add new item
                const newId = vegetables.length > 0 ? Math.max(...vegetables.map(v => v.id)) + 1 : 1;
                vegetables.push({ id: newId, name, price, unit, category, image });
            }

            localStorage.setItem('vegetables', JSON.stringify(vegetables));
            renderAdminTable();
            clearForm();
        }

        function editProduct(id) {
            const item = vegetables.find(v => v.id === id);
            if (item) {
                document.getElementById('prod-id').value = item.id;
                document.getElementById('prod-name').value = item.name;
                document.getElementById('prod-price').value = item.price;
                document.getElementById('prod-unit').value = item.unit;
                document.getElementById('prod-category').value = item.category;
                document.getElementById('prod-image').value = item.image;
            }
        }

        function deleteProduct(id) {
            if (confirm("Are you sure you want to remove this vegetable from inventory?")) {
                vegetables = vegetables.filter(v => v.id !== id);
                localStorage.setItem('vegetables', JSON.stringify(vegetables));
                renderAdminTable();
            }
        }

        function clearForm() {
            document.getElementById('prod-id').value = '';
            document.getElementById('product-form').reset();
        }

        window.onload = renderAdminTable;
    </script>
</body>
</html>
