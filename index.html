<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Grocer | Online Vegetable Store</title>
    <link rel="stylesheet" href="style.css">

<body>
    <header>
        <div class="header-container">
            <h1>Fresh Grocer</h1>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search vegetables...">
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 Cart (<span id="cart-count">0</span>)
            </div>
        </div>
    </header>

    <div class="container">
        <div class="categories" id="category-tags">
            <button class="active" onclick="filterCategory('all')">All</button>
            <button onclick="filterCategory('Greens')">Greens</button>
            <button onclick="filterCategory('Root')">Root Vegetables</button>
            <button onclick="filterCategory('Gourd')">Gourds</button>
            <button onclick="filterCategory('Nightshade')">Nightshades</button>
            <button onclick="filterCategory('Herbs')">Herbs & Spices</button>
        </div>

        <main class="product-grid" id="product-container"></main>
    </div>

    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
    <div class="cart-footer">
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px;">Delivery Address:</label>
            <textarea id="delivery-address" rows="3" placeholder="Enter your full address, landmark, and pincode..." style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box;"></textarea>
            <div class="total-price">Total: ₹<span id="cart-total">0</span></div>
            <button class="whatsapp-btn" onclick="openPaymentPortal()">Proceed to Payment</button>
        </div>
    </div>

            { id: 49, name: "Zucchini (Green)", price: 80, unit: "kg", category: "Gourd", image: "https://images.unsplash.com/photo-1604972688049-63ffb9d19a2e?w=150" },
            { id: 50, name: "Celery", price: 50, unit: "pack", category: "Herbs", image: "https://images.unsplash.com/photo-1614777986387-015c2a89b6f6?w=150" },

        // Initialize local database if empty
        if (!localStorage.getItem('vegetables')) {
            localStorage.setItem('vegetables', JSON.stringify(defaultVegetables));
        }

        let vegetables = JSON.parse(localStorage.getItem('vegetables'));
        let cart = {};
        let currentCategory = 'all';

        // Display Products
        function renderProducts() {
            const container = document.getElementById('product-container');
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            container.innerHTML = '';

            const filtered = vegetables.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = item.name.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            filtered.forEach(item => {
                const qty = cart[item.id] || 0;
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}" loading="lazy">
                    <h3>${item.name}</h3>
                    <p class="category-label">${item.category}</p>
                    <div class="price">₹${item.price} / ${item.unit}</div>
                    <div class="quantity-controls">
                        <button onclick="updateCartQuantity(${item.id}, -1)">-</button>
                        <span>${qty}</span>
                        <button onclick="updateCartQuantity(${item.id}, 1)">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Cart Actions
        function updateCartQuantity(id, change) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += change;
            if (cart[id] <= 0) delete cart[id];
            
            updateCartUI();
            renderProducts();
        }

        function updateCartUI() {
            let count = 0;
            let total = 0;
            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            Object.keys(cart).forEach(id => {
                const item = vegetables.find(v => v.id == id);
                if (item) {
                    count += cart[id];
                    total += item.price * cart[id];

                    const cartItem = document.createElement('div');
                    cartItem.className = 'cart-item';
                    cartItem.innerHTML = `
                        <div>
                            <strong>${item.name}</strong><br>
                            ₹${item.price} x ${cart[id]} ${item.unit}
                        </div>
                        <div>₹${item.price * cart[id]}</div>
                    `;
                    container.appendChild(cartItem);
                }
            });

            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('open');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.categories button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

      // WhatsApp Checkout Engine
        function checkoutWhatsApp() {
            if (Object.keys(cart).length === 0) {
                alert("Your cart is empty!");
                return;
            }

            // Grab the delivery address entered by the customer
            const address = document.getElementById('delivery-address').value.trim();
            if (!address) {
                alert("Please enter your complete delivery address before placing the order!");
                document.getElementById('delivery-address').focus();
                return;
            }

            // Replace with your real business WhatsApp number including country code (e.g., 919876543210)
            const businessNumber = "918838090005"; 
            
            let message = "*New Order Received from Fresh Grocer*\n\n";
            message += `*Delivery Address:*\n${address}\n\n`;
            message += "*Order Details:*\n";
            
            let total = 0;
            let index = 1;

            Object.keys(cart).forEach(id => {
                const item = vegetables.find(v => v.id == id);
                if (item) {
                    const cost = item.price * cart[id];
                    total += cost;
                    message += `${index++}. *${item.name}* - ${cart[id]} ${item.unit} (₹${cost})\n`;
                }
            });

            message += `\n*Grand Total: ₹${total}*\n\nPlease confirm my order and let me know when it will be delivered!`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://api.whatsapp.com/send?phone=${businessNumber}&text=${encodedMessage}`, '_blank');
        }
        // Listeners
        document.getElementById('search-input').addEventListener('input', renderProducts);
        
        // Initial setup
        window.onload = renderProducts;

        <div class="payment-modal-overlay" id="payment-modal" style="display: none;">
        <div class="payment-modal">
            <div class="cart-header">
                <h3>Complete Your Payment</h3>
                <button class="close-btn" onclick="closePaymentPortal()">✕</button>
            </div>
            <div class="payment-body">
                <p>Scan the QR code with any UPI app (GPay, PhonePe, Paytm) to pay the exact amount:</p>
                <div class="qr-container">
                    <img id="upi-qr-image" src="" alt="UPI Payment QR Code">
                </div>
                <div class="upi-details">
                    <p><strong>Amount Payable:</strong> ₹<span id="pay-amount">0</span></p>
                    <p><strong>UPI ID:</strong> <span id="merchant-upi-text">merchant@upi</span></p>
                </div>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
                <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; text-align: left;">Step 2: Enter Transaction ID / UTR Number</label>
                <input type="text" id="utr-number" placeholder="Enter 12-digit UTR / Ref Number" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px;">
                <button class="whatsapp-btn" onclick="checkoutWhatsApp()">Verify & Send Order via WhatsApp</button>
            </div>
        </div>
    </div>
