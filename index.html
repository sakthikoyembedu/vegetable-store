<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store | Online Ordering</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --background-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding-bottom: 80px;
        }

        /* Navigation & Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        header h1 {
            font-size: 1.5rem;
        }

        .cart-btn {
            background-color: #ffffff;
            color: var(--primary-color);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Product Grid */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-details {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .add-to-cart:hover {
            background-color: var(--primary-hover);
        }

        /* Cart Drawer / Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal {
            background-color: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-btn {
            background-color: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-total {
            font-size: 1.25rem;
            font-weight: bold;
            text-align: right;
            margin: 1.5rem 0;
            color: var(--primary-color);
        }

        /* Form Inputs */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        /* Payment Section */
        .payment-section {
            background-color: #f9fdf9;
            border: 1px dashed var(--primary-color);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .qr-code-img {
            width: 180px;
            height: 180px;
            margin: 1rem auto;
            display: block;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            background: white;
        }

        .upi-id-badge {
            background-color: #e8f5e9;
            color: var(--primary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .whatsapp-btn:hover {
            background-color: #1ebd5b;
        }

        @media (max-width: 600px) {
            header { padding: 1rem; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .product-image { height: 140px; }
            .product-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Store</h1>
        <button class="cart-btn" onclick="openCart()">
            🛒 Cart (<span id="cart-count">0</span>)
        </button>
    </header>

    <main class="container">
        <div class="product-grid" id="catalog">
            </div>
    </main>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Your Shopping Cart</h2>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>

            <div id="cart-items-list">
                </div>

            <div class="cart-total">
                Total Payable: ₹<span id="cart-total-amount">0</span>
            </div>

            <div id="checkout-form">
                <div class="form-group">
                    <label for="customer-name">Full Name *</label>
                    <input type="text" id="customer-name" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="customer-address">Delivery Address *</label>
                    <textarea id="customer-address" class="form-control" rows="3" placeholder="Street address, flat no., landmark" required></textarea>
                </div>

                <div class="payment-section">
                    <h3 style="color: var(--primary-color); font-size: 1.1rem;">Scan & Pay via Any UPI App</h3>
                    <p style="font-size: 0.85rem; color: #666; margin-top: 4px;">GPay, PhonePe, Paytm, BHIM</p>
                    
                    <img id="upi-qr" class="qr-code-img" src="" alt="UPI QR Code">
                    
                    <div style="font-size: 0.9rem;">Or pay manually to UPI ID:</div>
                    <div class="upi-id-badge">sakthindex-6@oksbi</div>
                </div>

                <div class="form-group">
                    <label for="utr-number">12-Digit UPI Transaction ID / UTR *</label>
                    <input type="text" id="utr-number" class="form-control" placeholder="e.g., 312456789012" maxlength="12" required>
                </div>

                <button class="whatsapp-btn" onclick="submitOrder()">
                    💬 Confirm Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const MERCHANT_UPI = "sakthindex-6@oksbi";
        const MERCHANT_NAME = "My Store";
        const WHATSAPP_NUMBER = "918838090005"; // Formatted with country code 91

        // SAMPLE PRODUCT CATALOG (Easily add or modify items here)
        const products = [
            { id: 1, name: "Fresh Farm Tomatoes", price: 40, unit: "1 kg", image: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400&auto=format&fit=crop&q=60" },
            { id: 2, name: "Organic Potatoes", price: 35, unit: "1 kg", image: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&auto=format&fit=crop&q=60" },
            { id: 3, name: "Red Onions", price: 50, unit: "1 kg", image: "https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb?w=400&auto=format&fit=crop&q=60" },
            { id: 4, name: "Baby Carrots", price: 60, unit: "500 g", image: "https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400&auto=format&fit=crop&q=60" },
            { id: 5, name: "Green Broccoli", price: 80, unit: "1 pc", image: "https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?w=400&auto=format&fit=crop&q=60" },
            { id: 6, name: "Fresh Spinach", price: 25, unit: "1 bunch", image: "https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=400&auto=format&fit=crop&q=60" }
        ];

        let cart = {};

        // Render Catalog on Load
        function renderCatalog() {
            const catalog = document.getElementById("catalog");
            catalog.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}" class="product-image">
                    <div class="product-details">
                        <div>
                            <div class="product-title">${p.name}</div>
                            <div style="font-size: 0.85rem; color: #666; margin-bottom: 4px;">Pack size: ${p.unit}</div>
                            <div class="product-price">₹${p.price}</div>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">+ Add to Cart</button>
                    </div>
                </div>
            `).join("");
        }

        // Cart Management
        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            updateCartUI();
        }

        function changeQty(id, delta) {
            if (!cart[id]) return;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            updateCartUI();
            renderCartItems();
        }

        function updateCartUI() {
            const totalCount = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
            document.getElementById("cart-count").innerText = totalCount;
        }

        function calculateTotal() {
            return Object.entries(cart).reduce((total, [id, qty]) => {
                const product = products.find(p => p.id == id);
                return total + (product ? product.price * qty : 0);
            }, 0);
        }

        // Modal Controls
        function openCart() {
            const total = calculateTotal();
            if (total === 0) {
                alert("Your shopping cart is empty! Add some products first.");
                return;
            }

            renderCartItems();
            
            // Generate Dynamic UPI QR Code for exact cart total
            const upiLink = `upi://pay?pa=${MERCHANT_UPI}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${total}&cu=INR`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;
            document.getElementById("upi-qr").src = qrUrl;

            document.getElementById("cart-modal").style.display = "flex";
        }

        function closeCart() {
            document.getElementById("cart-modal").style.display = "none";
        }

        function renderCartItems() {
            const container = document.getElementById("cart-items-list");
            const total = calculateTotal();
            
            if (total === 0) {
                closeCart();
                updateCartUI();
                return;
            }

            document.getElementById("cart-total-amount").innerText = total;

            container.innerHTML = Object.entries(cart).map(([id, qty]) => {
                const p = products.find(item => item.id == id);
                return `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight: 600;">${p.name}</div>
                            <div style="font-size: 0.85rem; color: #666;">₹${p.price} x ${qty} (${p.unit})</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="changeQty(${id}, -1)">-</button>
                            <span style="min-width: 20px; text-align: center; font-weight: 600;">${qty}</span>
                            <button class="qty-btn" onclick="changeQty(${id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        // WhatsApp Order Submission
        function submitOrder() {
            const name = document.getElementById("customer-name").value.trim();
            const address = document.getElementById("customer-address").value.trim();
            const utr = document.getElementById("utr-number").value.trim();
            const total = calculateTotal();

            if (!name || !address || !utr) {
                alert("Please fill in your Name, Delivery Address, and the 12-digit UPI UTR number to proceed.");
                return;
            }

            if (utr.length < 8) {
                alert("Please enter a valid Transaction ID / UTR number from your UPI app.");
                return;
            }

            // Construct WhatsApp Message
            let message = `*NEW PAID ORDER - ${MERCHANT_NAME}*\n\n`;
            message += `*Customer:* ${name}\n`;
            message += `*Address:* ${address}\n`;
            message += `*Payment Status:* PAID ✅\n`;
            message += `*UPI UTR / Ref No:* ${utr}\n\n`;
            message += `*Order Summary:*\n`;

            Object.entries(cart).forEach(([id, qty], index) => {
                const p = products.find(item => item.id == id);
                message += `${index + 1}. ${p.name} (${p.unit}) - ${qty} x ₹${p.price} = ₹${qty * p.price}\n`;
            });

            message += `\n*Grand Total Paid:* ₹${total}\n\n`;
            message += `_Please verify payment UTR and confirm dispatch!_`;

            // Open WhatsApp
            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;
            
            window.open(whatsappUrl, "_blank");

            // Optional: Clear cart after successful order redirect
            cart = {};
            updateCartUI();
            closeCart();
        }

        // Initialize App
        window.onload = renderCatalog;
    </script>
</body>
</html>
