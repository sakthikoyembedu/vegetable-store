<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Store | Online Ordering</title>
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --background-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding-bottom: 80px;
        }

        /* Navigation & Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        header h1 { font-size: 1.5rem; }

        .cart-btn {
            background-color: #ffffff;
            color: var(--primary-color);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Product Grid */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover { box-shadow: 0 8px 16px rgba(0,0,0,0.1); }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-details {
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .product-price { color: var(--primary-color); font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; }

        .add-to-cart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        .add-to-cart:hover { background-color: var(--primary-hover); }

        /* Cart Drawer / Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal {
            background-color: white;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #888; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-controls { display: flex; align-items: center; gap: 0.5rem; }

        .qty-btn {
            background-color: #eee;
            border: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-total {
            font-size: 1.25rem;
            font-weight: bold;
            text-align: right;
            margin: 1.5rem 0;
            color: var(--primary-color);
        }

        /* Form Inputs */
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.4rem; }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
        }

        /* UPI App Selection Buttons */
        .upi-app-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .app-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .app-btn:hover { opacity: 0.9; }
        .app-btn:active { transform: scale(0.98); }

        .btn-gpay { background-color: #202124; }
        .btn-phonepe { background-color: #5f259f; }
        .btn-paytm { background-color: #00b9f1; }
        .btn-any { background-color: #00897b; }

        /* Payment Status Animation Box */
        .payment-status-box {
            display: none;
            background-color: #fff3e0;
            border: 1px solid #ffe0b2;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #e65100;
        }

        .payment-section {
            background-color: #f9fdf9;
            border: 1px dashed var(--primary-color);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .qr-code-img {
            width: 160px; height: 160px;
            margin: 0.5rem auto;
            display: block;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 6px;
            background: white;
        }

        .whatsapp-btn {
            background-color: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.2s;
        }

        .whatsapp-btn:hover { background-color: #1ebd5b; }

        @media (max-width: 600px) {
            header { padding: 1rem; }
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .product-image { height: 140px; }
            .product-title { font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Store</h1>
        <button class="cart-btn" onclick="openCart()">
            🛒 Cart (<span id="cart-count">0</span>)
        </button>
    </header>

    <main class="container">
        <div class="product-grid" id="catalog"></div>
    </main>

    <!-- Shopping Cart & Payment Modal -->
    <div class="modal-overlay" id="cart-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Your Shopping Cart</h2>
                <button class="close-btn" onclick="closeCart()">&times;</button>
            </div>

            <div id="cart-items-list"></div>

            <div class="cart-total">
                Total Payable: ₹<span id="cart-total-amount">0</span>
            </div>

            <div id="checkout-form">
                <div class="form-group">
                    <label for="customer-name">Full Name *</label>
                    <input type="text" id="customer-name" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="customer-address">Delivery Address *</label>
                    <textarea id="customer-address" class="form-control" rows="2" placeholder="Street address, flat no., landmark" required></textarea>
                </div>

                <!-- UPI App Selection -->
                <div class="payment-section">
                    <h3 style="color: var(--primary-color); font-size: 1.05rem; margin-bottom: 5px;">Step 1: Tap to Pay with your App</h3>
                    <p style="font-size: 0.8rem; color: #666;">Choose your installed app to pay directly:</p>

                    <div class="upi-app-grid">
                        <button type="button" class="app-btn btn-gpay" onclick="payWithApp('Google Pay', 'gpay')">
                            GPay
                        </button>
                        <button type="button" class="app-btn btn-phonepe" onclick="payWithApp('PhonePe', 'phonepe')">
                            PhonePe
                        </button>
                        <button type="button" class="app-btn btn-paytm" onclick="payWithApp('Paytm', 'paytm')">
                            Paytm
                        </button>
                        <button type="button" class="app-btn btn-any" onclick="payWithApp('UPI App', 'any')">
                            Any UPI App
                        </button>
                    </div>

                    <!-- Status Notification Box -->
                    <div id="payment-status-box" class="payment-status-box">
                        <span id="payment-status-text">Waiting for payment...</span>
                    </div>

                    <div style="font-size: 0.85rem; color: #777; margin: 10px 0 5px;">Or scan QR code from any another phone:</div>
                    <img id="upi-qr" class="qr-code-img" src="" alt="UPI QR Code">
                </div>

                <div class="form-group">
                    <label for="utr-number">Step 2: UTR / Reference No (Optional if Paid via App)</label>
                    <input type="text" id="utr-number" class="form-control" placeholder="Paste 12-digit UTR if paying manually" maxlength="12">
                </div>

                <button class="whatsapp-btn" onclick="submitOrder('Manual Confirmation')">
                    💬 Confirm Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const MERCHANT_UPI = "sakthindex-6@oksbi";
        const MERCHANT_NAME = "My Store";
        const WHATSAPP_NUMBER = "918838090005"; // Formatted with country code 91

        // SAMPLE PRODUCT CATALOG
        const products = [
            { id: 1, name: "Fresh Farm Tomatoes", price: 40, unit: "1 kg", image: "https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=400&auto=format&fit=crop&q=60" },
            { id: 2, name: "Organic Potatoes", price: 35, unit: "1 kg", image: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&auto=format&fit=crop&q=60" },
            { id: 3, name: "Red Onions", price: 50, unit: "1 kg", image: "https://images.unsplash.com/photo-1618512496248-a07fe83aa8cb?w=400&auto=format&fit=crop&q=60" },
            { id: 4, name: "Baby Carrots", price: 60, unit: "500 g", image: "https://images.unsplash.com/photo-1598170845058-32b9d6a5da37?w=400&auto=format&fit=crop&q=60" },
            { id: 5, name: "Green Broccoli", price: 80, unit: "1 pc", image: "https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?w=400&auto=format&fit=crop&q=60" },
            { id: 6, name: "Fresh Spinach", price: 25, unit: "1 bunch", image: "https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=400&auto=format&fit=crop&q=60" }
        ];

        let cart = {};
        let paymentAppClicked = false;
        let selectedApp = "";

        // Render Catalog
        function renderCatalog() {
            const catalog = document.getElementById("catalog");
            catalog.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}" class="product-image">
                    <div class="product-details">
                        <div>
                            <div class="product-title">${p.name}</div>
                            <div style="font-size: 0.85rem; color: #666; margin-bottom: 4px;">Pack size: ${p.unit}</div>
                            <div class="product-price">₹${p.price}</div>
                        </div>
                        <button class="add-to-cart" onclick="addToCart(${p.id})">+ Add to Cart</button>
                    </div>
                </div>
            `).join("");
        }

        // Cart Actions
        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            updateCartUI();
        }

        function changeQty(id, delta) {
            if (!cart[id]) return;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            updateCartUI();
            renderCartItems();
        }

        function updateCartUI() {
            const totalCount = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
            document.getElementById("cart-count").innerText = totalCount;
        }

        function calculateTotal() {
            return Object.entries(cart).reduce((total, [id, qty]) => {
                const product = products.find(p => p.id == id);
                return total + (product ? product.price * qty : 0);
            }, 0);
        }

        // Modal Controls
        function openCart() {
            const total = calculateTotal();
            if (total === 0) {
                alert("Your shopping cart is empty! Add some products first.");
                return;
            }

            renderCartItems();
            
            // Generate QR Code Fallback
            const upiLink = `upi://pay?pa=${MERCHANT_UPI}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${total}&cu=INR`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink)}`;
            document.getElementById("upi-qr").src = qrUrl;

            document.getElementById("cart-modal").style.display = "flex";
        }

        function closeCart() {
            document.getElementById("cart-modal").style.display = "none";
            paymentAppClicked = false;
            document.getElementById("payment-status-box").style.display = "none";
        }

        function renderCartItems() {
            const container = document.getElementById("cart-items-list");
            const total = calculateTotal();
            
            if (total === 0) {
                closeCart();
                updateCartUI();
                return;
            }

            document.getElementById("cart-total-amount").innerText = total;

            container.innerHTML = Object.entries(cart).map(([id, qty]) => {
                const p = products.find(item => item.id == id);
                return `
                    <div class="cart-item">
                        <div>
                            <div style="font-weight: 600;">${p.name}</div>
                            <div style="font-size: 0.85rem; color: #666;">₹${p.price} x ${qty} (${p.unit})</div>
                        </div>
                        <div class="cart-item-controls">
                            <button class="qty-btn" onclick="changeQty(${id}, -1)">-</button>
                            <span style="min-width: 20px; text-align: center; font-weight: 600;">${qty}</span>
                            <button class="qty-btn" onclick="changeQty(${id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        // Direct App Launch Engine
        function payWithApp(appName, scheme) {
            const name = document.getElementById("customer-name").value.trim();
            const address = document.getElementById("customer-address").value.trim();
            
            if (!name || !address) {
                alert("Please enter your Full Name and Delivery Address before clicking to pay!");
                if (!name) document.getElementById("customer-name").focus();
                else document.getElementById("customer-address").focus();
                return;
            }

            const total = calculateTotal();
            const params = `pa=${MERCHANT_UPI}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${total}&cu=INR`;
            
            let deepLink = `upi://pay?${params}`;
            if (scheme === 'gpay') deepLink = `gpay://upi/pay?${params}`;
            if (scheme === 'phonepe') deepLink = `phonepe://pay?${params}`;
            if (scheme === 'paytm') deepLink = `paytmmp://pay?${params}`;

            selectedApp = appName;
            paymentAppClicked = true;

            // Show instruction while app is open
            const statusBox = document.getElementById("payment-status-box");
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = "#fff3e0";
            statusBox.style.borderColor = "#ffe0b2";
            statusBox.style.color = "#e65100";
            document.getElementById("payment-status-text").innerHTML = 
                `⌛ Opening <b>${appName}</b>...<br>Complete the ₹${total} payment, then <b>switch back to this browser tab</b> to auto-send your order!`;

            // Trigger app switch
            window.location.href = deepLink;
        }

        // Automatic Return Tracker & WhatsApp Dispatcher
        document.addEventListener("visibilitychange", () => {
            // When user switches back from GPay/PhonePe to the browser tab
            if (document.visibilityState === "visible" && paymentAppClicked) {
                paymentAppClicked = false; // Prevent double triggers
                
                const statusBox = document.getElementById("payment-status-box");
                statusBox.style.backgroundColor = "#e8f5e9";
                statusBox.style.borderColor = "#a5d6a7";
                statusBox.style.color = "#1b5e20";
                
                let seconds = 3;
                const countdown = setInterval(() => {
                    document.getElementById("payment-status-text").innerHTML = 
                        `✅ Welcome back! Auto-sending order to WhatsApp in <b>${seconds}</b> seconds...<br><small>(If blocked by browser, click Confirm Order below)</small>`;
                    seconds--;
                    
                    if (seconds < 0) {
                        clearInterval(countdown);
                        submitOrder(`Paid via ${selectedApp} (Auto-Sent)`);
                    }
                }, 1000);
            }
        });

        // WhatsApp Order Submission
        function submitOrder(paymentMethodText = "Manual Confirmation") {
            const name = document.getElementById("customer-name").value.trim();
            const address = document.getElementById("customer-address").value.trim();
            const utr = document.getElementById("utr-number").value.trim();
            const total = calculateTotal();

            if (!name || !address) {
                alert("Please fill in your Name and Delivery Address.");
                return;
            }

            // If paying manually and didn't use an app button, enforce UTR
            if (paymentMethodText === "Manual Confirmation" && utr.length < 8) {
                alert("Please enter a valid 12-digit UTR Transaction ID if you paid manually via QR code.");
                document.getElementById("utr-number").focus();
                return;
            }

            let message = `*NEW PAID ORDER - ${MERCHANT_NAME}*\n\n`;
            message += `*Customer:* ${name}\n`;
            message += `*Address:* ${address}\n`;
            message += `*Payment Status:* PAID ✅\n`;
            message += `*Method:* ${paymentMethodText}\n`;
            if (utr) message += `*UPI UTR / Ref No:* ${utr}\n`;
            message += `\n*Order Summary:*\n`;

            Object.entries(cart).forEach(([id, qty], index) => {
                const p = products.find(item => item.id == id);
                message += `${index + 1}. ${p.name} (${p.unit}) - ${qty} x ₹${p.price} = ₹${qty * p.price}\n`;
            });

            message += `\n*Grand Total Paid:* ₹${total}\n\n`;
            message += `_Please confirm my payment and let me know when it will be dispatched!_`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;
            
            window.open(whatsappUrl, "_blank");

            // Reset
            cart = {};
            updateCartUI();
            closeCart();
        }

        // Initialize App
        window.onload = renderCatalog;
    </script>
</body>
</html>
